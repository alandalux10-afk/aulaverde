<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configuración - Aula Verde</title>
  <link rel="stylesheet" href="../css/configuracion.css">
</head>
<body>
  <div class="cabecera">
    <h1>⚙️ Configuración de la tienda</h1>
  </div>

  <div class="formulario">
    <div class="grupo">
      <label>Nombre de la tienda</label>
      <input type="text" id="nombre_tienda">
    </div>
    <div class="grupo">
      <label>Razón social</label>
      <input type="text" id="razon_social">
    </div>
    <div class="grupo">
      <label>NIF / CIF</label>
      <input type="text" id="nif_vendedor">
    </div>
    <div class="grupo">
      <label>Dirección</label>
      <input type="text" id="direccion">
    </div>
    <div class="grupo">
      <label>Teléfono</label>
      <input type="text" id="telefono">
    </div>
    <div class="grupo">
      <label>Email</label>
      <input type="text" id="email">
    </div>
    <div class="grupo">
      <label>Impresora de tickets</label>
      <input type="text" id="impresora_ticket">
    </div>
    <div class="grupo">
      <label>Impresora de facturas</label>
      <input type="text" id="impresora_factura">
    </div>

    <div class="separador"></div>

    <div class="grupo">
      <label>🤖 Clave API Anthropic (para extracción de facturas)</label>
      <input type="password" id="api_key_anthropic" placeholder="sk-ant-...">
      <small>Esta clave se guarda localmente y nunca se comparte. Se usa para leer facturas PDF automáticamente.</small>
    </div>
<div class="separador"></div>

    <div class="grupo">
      <label>🎁 Puntos: € gastados para generar 1 punto</label>
      <input type="number" id="puntos_euros_por_punto" min="0.01" step="0.01" placeholder="10">
      <small>Ejemplo: si pones 10, el cliente gana 1 punto por cada 10€ gastados.</small>
    </div>
    <div class="grupo">
      <label>🎁 Puntos: valor en € de 100 puntos al canjear</label>
      <input type="number" id="puntos_valor_canje" min="0" step="0.01" placeholder="5">
      <small>Ejemplo: si pones 5, cada 100 puntos del cliente valen 5€ de descuento.</small>
    </div>
    <div class="botones">
      <button id="btn-guardar">💾 Guardar</button>
      <button id="btn-backup">☁️ Copia de seguridad</button>
      <button id="btn-cerrar">✖ Cerrar</button>
    </div>
    <div class="botones" style="margin-top:12px;">
      <button id="btn-importar-csv">📥 Importar CSV productos</button>
      <button id="btn-exportar-csv">📤 Exportar CSV productos</button>
    </div>

  </div>

  <script src="../js/configuracion.js"></script>
</body>
</html>
