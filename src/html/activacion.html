<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Activación</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, Segoe UI, Arial, sans-serif;
      background: #f4f6f4;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .tarjeta {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      width: 520px;
      max-width: 92vw;
      padding: 36px 40px;
    }
    .cabecera {
      background: #2d6a2d;
      color: white;
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    .cabecera h1 {
      margin: 0;
      font-size: 22px;
    }
    .cabecera p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    textarea {
      width: 100%;
      min-height: 110px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: Consolas, monospace;
      font-size: 12px;
      resize: vertical;
    }
    .ayuda {
      font-size: 12px;
      color: #777;
      margin-top: 6px;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      background: #2d6a2d;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    button:hover:not(:disabled) {
      background: #245524;
    }
    .mensaje {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .mensaje.error {
      background: #fdecea;
      color: #b71c1c;
      display: block;
    }
    .mensaje.ok {
      background: #e8f5e9;
      color: #1b5e20;
      display: block;
    }
    .pie {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="tarjeta">
    <div class="cabecera">
      <h1>🔑 Activación necesaria</h1>
      <p>Introduce tu clave de licencia para continuar</p>
    </div>

    <label for="campo-licencia">Clave de licencia</label>
    <textarea id="campo-licencia" placeholder="Pega aquí la clave de licencia que te han facilitado"></textarea>
    <div class="ayuda">Es un texto largo, sin espacios, que empieza y termina en letras y números. Si no la tienes, contacta con quien te vendió el producto.</div>

    <button id="btn-activar">Activar</button>

    <div id="mensaje" class="mensaje"></div>

    <div class="pie">Puntal TPV</div>
  </div>

  <script src="../js/activacion.js"></script>
</body>
</html>
